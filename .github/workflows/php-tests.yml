name: PHP Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # Unit suite is pure PHP (no wp-env), so a Docker Hub outage can't block it.
  unit:
    name: PHPUnit (unit)
    runs-on: ubuntu-latest
    # Skip on fork PRs — GitHub withholds secrets, so the Private Packagist install would fail.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, xml
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        env:
          COMPOSER_AUTH: ${{ secrets.POSTNL_PRIVATE_PACKAGIST_AUTH }}

      - name: Assert no Packagist credential written by Composer
        shell: bash
        run: |
          # Scan only where Composer writes auth.json: project root + Composer home.
          # Runner tooling (setup-php) pre-creates ~/.composer/auth.json with a
          # github-oauth token, so only a Packagist credential on disk is a leak.
          SCAN_DIRS=("$GITHUB_WORKSPACE")
          [ -n "$COMPOSER_HOME" ] && [ -d "$COMPOSER_HOME" ] && SCAN_DIRS+=("$COMPOSER_HOME")
          [ -d "$HOME/.composer" ] && SCAN_DIRS+=("$HOME/.composer")
          [ -d "$HOME/.config/composer" ] && SCAN_DIRS+=("$HOME/.config/composer")
          LEAK=0
          while IFS= read -r auth_file; do
            if grep -qi "packagist" "$auth_file"; then
              echo "::error::Composer auth file with a Packagist credential found on disk: $auth_file"
              LEAK=1
            else
              echo "Ignoring non-Packagist auth file created by runner tooling: $auth_file"
            fi
          done < <(find "${SCAN_DIRS[@]}" -maxdepth 1 \( -name "auth.json" -o -name "auth.*.json" \) 2>/dev/null)
          if [ "$LEAK" -eq 1 ]; then
            exit 1
          fi
          echo "Auth file check passed — no Packagist credential written to disk."

      - name: Unit tests
        run: vendor/bin/phpunit -c phpunit-unit.xml.dist

  # Integration suite needs a real WordPress, so it runs inside the wp-env
  # tests-cli container. wp-env start is wrapped in a retry because the Docker
  # image pulls occasionally time out against Docker Hub on the runner.
  integration:
    name: PHPUnit (integration)
    runs-on: ubuntu-latest
    # Skip on fork PRs — GitHub withholds secrets, so the Private Packagist install would fail.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci --prefer-offline

      # vendor/autoload.php must exist before wp-env starts, because wp-env
      # activates the plugin via WP-CLI during startup and the plugin bootstrap
      # requires the autoloader immediately. The action caches the Composer
      # download cache (keyed on composer.lock) and then runs composer install;
      # the resulting vendor/ tree is mounted into the tests-cli container by
      # wp-env alongside the plugin source.
      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        env:
          COMPOSER_AUTH: ${{ secrets.POSTNL_PRIVATE_PACKAGIST_AUTH }}

      - name: Assert no Packagist credential written by Composer
        shell: bash
        run: |
          # Scan only where Composer writes auth.json: project root + Composer home.
          # Runner tooling (setup-php) pre-creates ~/.composer/auth.json with a
          # github-oauth token, so only a Packagist credential on disk is a leak.
          SCAN_DIRS=("$GITHUB_WORKSPACE")
          [ -n "$COMPOSER_HOME" ] && [ -d "$COMPOSER_HOME" ] && SCAN_DIRS+=("$COMPOSER_HOME")
          [ -d "$HOME/.composer" ] && SCAN_DIRS+=("$HOME/.composer")
          [ -d "$HOME/.config/composer" ] && SCAN_DIRS+=("$HOME/.config/composer")
          LEAK=0
          while IFS= read -r auth_file; do
            if grep -qi "packagist" "$auth_file"; then
              echo "::error::Composer auth file with a Packagist credential found on disk: $auth_file"
              LEAK=1
            else
              echo "Ignoring non-Packagist auth file created by runner tooling: $auth_file"
            fi
          done < <(find "${SCAN_DIRS[@]}" -maxdepth 1 \( -name "auth.json" -o -name "auth.*.json" \) 2>/dev/null)
          if [ "$LEAK" -eq 1 ]; then
            exit 1
          fi
          echo "Auth file check passed — no Packagist credential written to disk."

      # Retry: wp-env image pulls occasionally time out against Docker Hub.
      - name: Start wp-env
        run: |
          STARTED=0
          for i in 1 2 3; do
            if npm run env start; then
              STARTED=1
              break
            fi
            echo "wp-env start failed (attempt $i); retrying in 15s..."
            npm run env stop || true
            sleep 15
          done
          if [ "$STARTED" -ne 1 ]; then
            echo "::error::wp-env failed to start after 3 attempts"
            exit 1
          fi
        timeout-minutes: 12

      - name: Integration tests
        run: npm run test:php:integration

      - name: Stop wp-env
        if: always()
        run: npm run env stop
